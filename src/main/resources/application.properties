spring.application.name=todo-app

# DB接続設定
spring.datasource.url=jdbc:postgresql://localhost:5432/todo_postgres
spring.datasource.username=shink
spring.datasource.password=beniimo
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernateが実行するSQLをデバッグモードで出力（show-sqlと同じ役割）
logging.level.org.hibernate.SQL=DEBUG

# SQLに流し込まれたパラメータ（? の中身）をログに出力する【超重要】
logging.level.org.hibernate.orm.results.loading=TRACE

# MyBatisにXMLマッパーの場所を教える設定（★超重要）
mybatis.mapper-locations=classpath:mapper/*.xml

# 以前お伝えした、スネークケースをキャメルケースに自動変換する設定
mybatis.configuration.map-underscore-to-camel-case=true