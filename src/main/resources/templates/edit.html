<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク変更画面</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
        input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background-color: white;
        }
        .error-message { color: #ef4444; font-size: 0.85rem; margin-top: 0.25rem; }
        .actions { display: flex; align-items: center; gap: 10px; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>タスク変更</h1>
        <p>変更内容を入力してください</p>

        <form th:action="@{/task/confirm}" method="post" th:object="${form}">
            <input type="hidden" th:field="*{taskId}">
            
            <div class="form-group">
                <label for="title">タイトル</label>
                <input type="text" th:field="*{title}">
                <div class="error-message" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>

            <div class="form-group">
                <label for="description">説明</label>
                <input type="text" th:field="*{description}">
                <div class="error-message" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>

            <div class="form-group">
                <label for="deadline">期限</label>
                <input type="date" id="deadline" name="deadline" th:value="${#temporals.format(form.deadline, 'yyyy-MM-dd')}">
                <div class="error-message" th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}"></div>
            </div>

            <div class="form-group">
                <label for="status">ステータス</label>
                <select th:field="*{status}">
                    <option value="0">未着手</option>
                    <option value="1">作業中</option>
                    <option value="2">完了</option>
                </select>
            </div>

            <input type="hidden" name="submitView" value="edit">

            <div class="actions">
                <button type="submit" class="btn btn-primary">確認画面へ</button>
                <a class="btn" th:href="@{/task/list}" style="color: #64748b;">キャンセル</a>
            </div>
        </form>
    </div>
</body>
</html>
