<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク一覧画面</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1>タスク一覧</h1>
        
        <div style="margin-bottom: 20px;">
            <a th:href="@{/task/add}" class="btn btn-primary">+ 新規登録</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>タイトル</th>
                    <th>説明</th>
                    <th>期限</th>
                    <th>ステータス</th>
                    <th>オプション</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="task : ${tasks}" th:object="${task}">
                    <td th:text="*{title}" style="font-weight: bold;"></td>
                    <td th:text="*{description}"></td>
                    <td th:text="*{deadline}"></td>
                    <td>
                        <span class="status-badge" th:text="*{status}"></span>
                    </td>
                    <td style="display: flex; gap: 5px;">
                        <form th:action="@{/task/edit}" method="post">
                            <input type="hidden" name="taskId" th:value="*{taskId}">
                            <button type="submit" class="btn btn-primary" style="padding: 5px 10px; font-size: 0.8rem;">変更</button>
                        </form>
                        <form th:action="@{/task/deleteConf}" method="post">
                            <input type="hidden" name="taskId" th:value="*{taskId}">
                            <button type="submit" class="btn btn-danger" style="padding: 5px 10px; font-size: 0.8rem;">削除</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
