<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>確認画面</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .confirm-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .data-row {
            display: grid;
            grid-template-columns: 150px 1fr;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .data-label { font-weight: bold; color: #475569; }
        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        
        /* ステータスバッジの改行防止用クラス */
        .status-badge {
            display: inline-block;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>確認画面</h1>
        <p>下記の内容で登録します。よろしいですか？</p>

        <div class="confirm-card" th:object="${form}">
            <div class="data-row">
                <span class="data-label">タイトル</span>
                <span th:text="*{title}"></span>
            </div>
            <div class="data-row">
                <span class="data-label">説明</span>
                <span th:text="*{description}"></span>
            </div>
            <div class="data-row">
                <span class="data-label">期限</span>
                <span th:text="*{deadline}"></span>
            </div>
            <div class="data-row">
                <span class="data-label">ステータス</span>
                <span class="status-badge" th:switch="*{status}">
                    <th:block th:case="0">未着手</th:block>
                    <th:block th:case="1">作業中</th:block>
                    <th:block th:case="2">完了</th:block>
                </span>
            </div>
        </div>

        <form th:action="@{/task/save}" method="post" th:object="${form}">
            <input type="hidden" th:field="*{taskId}">
            <input type="hidden" th:field="*{title}">
            <input type="hidden" th:field="*{description}">
            <input type="hidden" th:field="*{deadline}">
            <input type="hidden" th:field="*{status}">
            <input type="hidden" th:field="*{submitView}">

            <div class="btn-group">
                <button type="submit" class="btn btn-primary">登録を完了する</button>
                <button type="submit" th:formaction="@{/back}" class="btn" style="background-color: #64748b;">戻る</button>
            </div>
        </form>
    </div>
</body>
</html>
